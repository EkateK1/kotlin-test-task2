databaseChangeLog:
  - changeSet:
      id: 002-create-subscriptions-table
      author: andrey
      changes:
        - createTable:
            tableName: subscriptions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: plan_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: subscriptions
            baseColumnNames: plan_id
            referencedTableName: subscription_plans
            referencedColumnNames: id
            constraintName: fk_subscriptions_plan_id

        - sql:
            dbms: postgresql
            sql: "ALTER TABLE subscriptions ADD CONSTRAINT chk_subscriptions_status CHECK (status IN ('ACTIVE', 'PAUSED', 'CANCELLED', 'EXPIRED'))"

        - sql:
            dbms: postgresql
            sql: "ALTER TABLE subscriptions ADD CONSTRAINT chk_subscriptions_dates CHECK (end_date >= start_date)"

        - sql:
            dbms: postgresql
            sql: "ALTER TABLE subscriptions ADD CONSTRAINT chk_subscriptions_price_positive CHECK (actual_price >= 0)"
