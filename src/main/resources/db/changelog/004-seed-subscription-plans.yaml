databaseChangeLog:
  - changeSet:
      id: 004-seed-subscription-plans
      author: task2
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              INSERT INTO subscription_plans
                (id, service_name, plan_name, description, default_price, currency, duration_days, is_active, created_at)
              VALUES
                ('11111111-1111-1111-1111-111111111111', 'music', 'BASIC', 'Basic music subscription', 199.00, 'RUB', 30, true, now()),
                ('22222222-2222-2222-2222-222222222222', 'music', 'PREMIUM', 'Premium music subscription', 399.00, 'RUB', 30, true, now()),
                ('33333333-3333-3333-3333-333333333333', 'video', 'BASIC', 'Basic video subscription', 299.00, 'RUB', 30, true, now()),
                ('44444444-4444-4444-4444-444444444444', 'video', 'ANNUAL', 'Annual video subscription', 2990.00, 'RUB', 365, true, now())
              ON CONFLICT (service_name, plan_name) DO NOTHING;
